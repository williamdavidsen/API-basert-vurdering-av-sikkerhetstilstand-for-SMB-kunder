<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="2800" viewBox="0 0 1800 2800">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#243447"/>
    </marker>
    <marker id="openArrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 1 1 L 9 5 L 1 9" fill="none" stroke="#243447" stroke-width="1.5"/>
    </marker>
    <style>
      .title { font: 700 28px 'Segoe UI', Arial, sans-serif; fill: #132238; }
      .subtitle { font: 700 18px 'Segoe UI', Arial, sans-serif; fill: #132238; }
      .label { font: 14px 'Segoe UI', Arial, sans-serif; fill: #1f2d3d; }
      .small { font: 12px 'Segoe UI', Arial, sans-serif; fill: #31465f; }
      .box { fill: #ffffff; stroke: #243447; stroke-width: 2; rx: 8; ry: 8; }
      .note { fill: #fff4cf; stroke: #b38a00; stroke-width: 1.5; rx: 8; ry: 8; }
      .frame { fill: none; stroke: #6a7c92; stroke-width: 2; }
      .life { stroke: #8ea0b5; stroke-width: 2; stroke-dasharray: 7 6; }
      .msg { stroke: #243447; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .ret { stroke: #243447; stroke-width: 1.8; fill: none; stroke-dasharray: 7 6; marker-end: url(#openArrow); }
      .divider { stroke: #9aa9b8; stroke-width: 1.5; stroke-dasharray: 5 5; }
    </style>
  </defs>

  <rect x="0" y="0" width="1800" height="2800" fill="#f4f7fb"/>
  <text x="60" y="55" class="title">Updated Sequence Diagrams</text>
  <text x="60" y="85" class="label">Reference version drawn according to the current backend code</text>

  <!-- Section 1 -->
  <text x="60" y="145" class="subtitle">UC-01 Input and Validation</text>

  <rect x="70" y="180" width="80" height="80" class="box"/>
  <text x="90" y="225" class="label">STORM</text>
  <text x="102" y="243" class="label">IT</text>

  <rect x="280" y="180" width="160" height="60" class="box"/>
  <text x="310" y="217" class="label">AnalysisScreen</text>

  <rect x="600" y="180" width="180" height="60" class="box"/>
  <text x="628" y="217" class="label">AssessmentController</text>

  <rect x="960" y="180" width="170" height="60" class="box"/>
  <text x="991" y="217" class="label">DTO + ModelState</text>

  <line x1="110" y1="260" x2="110" y2="760" class="life"/>
  <line x1="360" y1="240" x2="360" y2="760" class="life"/>
  <line x1="690" y1="240" x2="690" y2="760" class="life"/>
  <line x1="1045" y1="240" x2="1045" y2="760" class="life"/>

  <line x1="120" y1="300" x2="350" y2="300" class="msg"/>
  <text x="165" y="292" class="small">openAnalysisScreen()</text>

  <line x1="350" y1="345" x2="120" y2="345" class="ret"/>
  <text x="180" y="337" class="small">showInputField()</text>

  <line x1="120" y1="390" x2="350" y2="390" class="msg"/>
  <text x="155" y="382" class="small">enterTarget(domain/url/email/ip)</text>

  <line x1="370" y1="440" x2="680" y2="440" class="msg"/>
  <text x="450" y="432" class="small">POST /api/assessment/check</text>

  <line x1="700" y1="485" x2="1035" y2="485" class="msg"/>
  <text x="790" y="477" class="small">request binding + validation</text>

  <line x1="1035" y1="530" x2="700" y2="530" class="ret"/>
  <text x="815" y="522" class="small">ModelState result</text>

  <rect x="250" y="565" width="900" height="160" class="frame"/>
  <text x="265" y="590" class="label">ALT</text>
  <line x1="250" y1="635" x2="1150" y2="635" class="divider"/>
  <text x="285" y="620" class="small">[ModelState invalid]</text>
  <text x="285" y="690" class="small">[ModelState valid]</text>

  <line x1="680" y1="610" x2="370" y2="610" class="ret"/>
  <text x="505" y="602" class="small">400 BadRequest(ModelState)</text>

  <line x1="350" y1="655" x2="120" y2="655" class="ret"/>
  <text x="210" y="647" class="small">showErrorMessage()</text>

  <line x1="700" y1="705" x2="1035" y2="705" class="msg"/>
  <text x="795" y="697" class="small">CheckAssessmentAsync(domain)</text>

  <rect x="1210" y="405" width="480" height="150" class="note"/>
  <text x="1230" y="435" class="label">Not</text>
  <text x="1230" y="468" class="small">Input format validation in the code currently relies mostly on</text>
  <text x="1230" y="490" class="small">Required + StringLength + domain normalization.</text>
  <text x="1230" y="512" class="small">There is no dedicated domain/IP parser layer yet.</text>

  <!-- Section 2 -->
  <text x="60" y="855" class="subtitle">UC-02 Combined Analysis</text>

  <rect x="30" y="900" width="150" height="60" class="box"/>
  <text x="58" y="937" class="label">AnalysisScreen</text>

  <rect x="220" y="900" width="180" height="60" class="box"/>
  <text x="248" y="937" class="label">AssessmentController</text>

  <rect x="450" y="900" width="210" height="60" class="box"/>
  <text x="475" y="937" class="label">AssessmentCheckingService</text>

  <rect x="760" y="900" width="150" height="60" class="box"/>
  <text x="783" y="937" class="label">SSL</text>

  <rect x="970" y="900" width="150" height="60" class="box"/>
  <text x="987" y="937" class="label">Headers</text>

  <rect x="1180" y="900" width="150" height="60" class="box"/>
  <text x="1208" y="937" class="label">Email</text>

  <rect x="1390" y="900" width="170" height="60" class="box"/>
  <text x="1412" y="937" class="label">Reputation</text>

  <rect x="1610" y="900" width="140" height="60" class="box"/>
  <text x="1654" y="937" class="label">PQC</text>

  <line x1="105" y1="960" x2="105" y2="1840" class="life"/>
  <line x1="310" y1="960" x2="310" y2="1840" class="life"/>
  <line x1="555" y1="960" x2="555" y2="1840" class="life"/>
  <line x1="835" y1="960" x2="835" y2="1840" class="life"/>
  <line x1="1045" y1="960" x2="1045" y2="1840" class="life"/>
  <line x1="1255" y1="960" x2="1255" y2="1840" class="life"/>
  <line x1="1475" y1="960" x2="1475" y2="1840" class="life"/>
  <line x1="1680" y1="960" x2="1680" y2="1840" class="life"/>

  <line x1="115" y1="1005" x2="300" y2="1005" class="msg"/>
  <text x="150" y="997" class="small">POST /api/assessment/check</text>

  <line x1="320" y1="1048" x2="545" y2="1048" class="msg"/>
  <text x="375" y="1040" class="small">CheckAssessmentAsync(domain)</text>

  <rect x="695" y="1085" width="1040" height="360" class="frame"/>
  <text x="710" y="1110" class="label">PAR</text>

  <line x1="565" y1="1140" x2="825" y2="1140" class="msg"/>
  <text x="635" y="1132" class="small">CheckSslAsync(domain)</text>

  <line x1="565" y1="1190" x2="1035" y2="1190" class="msg"/>
  <text x="700" y="1182" class="small">CheckHeadersAsync(domain)</text>

  <line x1="565" y1="1240" x2="1245" y2="1240" class="msg"/>
  <text x="745" y="1232" class="small">CheckEmailAsync(domain)</text>

  <line x1="565" y1="1290" x2="1465" y2="1290" class="msg"/>
  <text x="760" y="1282" class="small">CheckReputationAsync(domain)</text>

  <line x1="565" y1="1340" x2="1670" y2="1340" class="msg"/>
  <text x="820" y="1332" class="small">CheckPqcAsync(domain)</text>

  <line x1="825" y1="1385" x2="565" y2="1385" class="ret"/>
  <text x="700" y="1377" class="small">sslResult</text>

  <line x1="1035" y1="1405" x2="565" y2="1405" class="ret"/>
  <text x="805" y="1397" class="small">headersResult</text>

  <line x1="1245" y1="1425" x2="565" y2="1425" class="ret"/>
  <text x="920" y="1417" class="small">emailResult</text>

  <line x1="1465" y1="1445" x2="565" y2="1445" class="ret"/>
  <text x="1030" y="1437" class="small">reputationResult</text>

  <line x1="1670" y1="1465" x2="565" y2="1465" class="ret"/>
  <text x="1130" y="1457" class="small">pqcResult</text>

  <line x1="565" y1="1515" x2="760" y2="1515" class="msg"/>
  <text x="595" y="1507" class="small">Task.WhenAll(...)</text>

  <rect x="430" y="1560" width="900" height="190" class="frame"/>
  <text x="445" y="1585" class="label">ALT</text>
  <line x1="430" y1="1650" x2="1330" y2="1650" class="divider"/>
  <text x="460" y="1625" class="small">[Email applicable + MX record exists]</text>
  <text x="460" y="1715" class="small">[Email not applicable]</text>
  <text x="760" y="1625" class="small">weights: SSL 35 / Headers 25 / Email 20 / Reputation 20</text>
  <text x="760" y="1715" class="small">weights: SSL 50 / Headers 35 / Reputation 15</text>

  <line x1="565" y1="1785" x2="1045" y2="1785" class="msg"/>
  <text x="645" y="1777" class="small">module scores + normalized contributions + alerts</text>

  <rect x="430" y="1820" width="980" height="210" class="frame"/>
  <text x="445" y="1845" class="label">ALT</text>
  <line x1="430" y1="1895" x2="1410" y2="1895" class="divider"/>
  <line x1="430" y1="1955" x2="1410" y2="1955" class="divider"/>
  <text x="460" y="1880" class="small">[ssl.Status == FAIL and ssl.OverallScore == 0]</text>
  <text x="460" y="1940" class="small">[any required module Status == ERROR]</text>
  <text x="460" y="2005" class="small">[otherwise]</text>
  <text x="910" y="1880" class="small">final Status = FAIL</text>
  <text x="910" y="1940" class="small">final Status = PARTIAL</text>
  <text x="910" y="2005" class="small">final Status from score: PASS / WARNING / FAIL</text>

  <line x1="545" y1="2075" x2="320" y2="2075" class="ret"/>
  <text x="425" y="2067" class="small">AssessmentCheckResult</text>

  <line x1="300" y1="2120" x2="115" y2="2120" class="ret"/>
  <text x="145" y="2112" class="small">200 OK + overall score + grade + modules + pqc + alerts</text>

  <rect x="1230" y="1010" width="470" height="150" class="note"/>
  <text x="1250" y="1040" class="label">Not</text>
  <text x="1250" y="1073" class="small">Code reality: modules do not run sequentially; they run in parallel.</text>
  <text x="1250" y="1095" class="small">Because of this, the old sequential sequence flow does not</text>
  <text x="1250" y="1117" class="small">represent the current implementation.</text>

  <rect x="1230" y="1175" width="470" height="150" class="note"/>
  <text x="1250" y="1205" class="label">Not</text>
  <text x="1250" y="1238" class="small">In general error cases, all modules are not re-normalized.</text>
  <text x="1250" y="1260" class="small">The weight model changes only when the email module is not applicable.</text>

  <!-- Section 3 -->
  <text x="60" y="2195" class="subtitle">UC-03 Result and Module Detail</text>

  <rect x="70" y="2235" width="80" height="80" class="box"/>
  <text x="90" y="2280" class="label">STORM</text>
  <text x="102" y="2298" class="label">IT</text>

  <rect x="280" y="2235" width="160" height="60" class="box"/>
  <text x="318" y="2272" class="label">ResultScreen</text>

  <rect x="610" y="2235" width="160" height="60" class="box"/>
  <text x="640" y="2272" class="label">Assessment API</text>

  <rect x="970" y="2235" width="160" height="60" class="box"/>
  <text x="995" y="2272" class="label">Module Endpoint</text>

  <line x1="110" y1="2315" x2="110" y2="2720" class="life"/>
  <line x1="360" y1="2295" x2="360" y2="2720" class="life"/>
  <line x1="690" y1="2295" x2="690" y2="2720" class="life"/>
  <line x1="1050" y1="2295" x2="1050" y2="2720" class="life"/>

  <line x1="120" y1="2340" x2="350" y2="2340" class="msg"/>
  <text x="170" y="2332" class="small">viewOverallResult()</text>

  <line x1="370" y1="2370" x2="680" y2="2370" class="msg"/>
  <text x="425" y="2362" class="small">GET /api/assessment/check/{domain}</text>

  <line x1="680" y1="2410" x2="370" y2="2410" class="ret"/>
  <text x="410" y="2402" class="small">overall score + grade + modules + alerts + pqc</text>

  <line x1="120" y1="2470" x2="350" y2="2470" class="msg"/>
  <text x="185" y="2462" class="small">clickReadMore(module)</text>

  <rect x="250" y="2510" width="980" height="170" class="frame"/>
  <text x="265" y="2535" class="label">ALT</text>
  <line x1="250" y1="2600" x2="1230" y2="2600" class="divider"/>
  <text x="280" y="2580" class="small">[Module detail endpoint is used]</text>
  <text x="280" y="2645" class="small">[Sadece show module summary from combined resultilir]</text>

  <line x1="370" y1="2570" x2="1040" y2="2570" class="msg"/>
  <text x="520" y="2562" class="small">GET /api/{module}/check/{domain}</text>

  <line x1="1040" y1="2615" x2="370" y2="2615" class="ret"/>
  <text x="545" y="2607" class="small">module result + reasons + alerts</text>

  <line x1="350" y1="2660" x2="120" y2="2660" class="ret"/>
  <text x="190" y="2652" class="small">showModuleDetail()</text>

  <line x1="350" y1="2700" x2="120" y2="2700" class="ret"/>
  <text x="135" y="2692" class="small">show module summary from combined result</text>

  <rect x="1260" y="2470" width="420" height="170" class="note"/>
  <text x="1280" y="2500" class="label">Not</text>
  <text x="1280" y="2533" class="small">Recommended product flow: ResultScreen first uses the combined</text>
  <text x="1280" y="2555" class="small">endpoint. For read more, the related module endpoint can then</text>
  <text x="1280" y="2577" class="small">be called to show more detailed reason and alert</text>
  <text x="1280" y="2599" class="small">information.</text>
</svg>
